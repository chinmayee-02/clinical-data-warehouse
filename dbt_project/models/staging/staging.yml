version: 2

sources:
  - name: bronze
    database: CLINICAL_WAREHOUSE
    schema: BRONZE
    tables:
      - name: patients
      - name: encounters
      - name: conditions
      - name: medications
      - name: payers
      - name: providers

models:
  - name: stg_patients
    description: "Cleaned patient demographics"
    columns:
      - name: patient_id
        tests: [not_null, unique]
      - name: gender
        tests:
          - accepted_values:
              values: ["M", "F", "OTHER"]
              quote: true

  - name: stg_encounters
    description: "Clinical encounters"
    columns:
      - name: encounter_id
        tests: [not_null, unique]
      - name: patient_id
        tests: [not_null]

  - name: stg_conditions
    description: "Patient diagnoses"
    columns:
      - name: patient_id
        tests: [not_null]
      - name: condition_code
        tests: [not_null]

  - name: stg_medications
    description: "Medication orders"
    columns:
      - name: patient_id
        tests: [not_null]

  - name: stg_payers
    description: "Insurance payers"
    columns:
      - name: payer_id
        tests: [not_null, unique]

  - name: stg_providers
    description: "Clinical providers"
    columns:
      - name: provider_id
        tests: [not_null, unique]
